strategy:
  name: UTIL Modern Regime Allocation
  version: 1.0
  benchmark: UTIL
  mode: long_only
  objective: outperform_util_with_lower_or_equal_drawdown

universe:
  source: B3_UTIL
  auto_update: false
  assets:
    AXIA3: {name: Axia Energia, sector: Energia Elétrica, index_weight: 0.1977}
    SBSP3: {name: Sabesp, sector: Água e Saneamento, index_weight: 0.1885}
    EQTL3: {name: Equatorial Energia, sector: Energia Elétrica, index_weight: 0.1181}
    ENEV3: {name: Eneva, sector: Energia Elétrica, index_weight: 0.1178}
    CPLE3: {name: Copel, sector: Energia Elétrica, index_weight: 0.1084}
    CMIG4: {name: Cemig, sector: Energia Elétrica, index_weight: 0.0514}
    ENGI11: {name: Energisa, sector: Energia Elétrica, index_weight: 0.0378}
    EGIE3: {name: Engie Brasil, sector: Energia Elétrica, index_weight: 0.0309}
    ISAE4: {name: ISA Energia Brasil, sector: Energia Elétrica, index_weight: 0.0290}
    CSMG3: {name: Copasa, sector: Água e Saneamento, index_weight: 0.0267}
    TAEE11: {name: Taesa, sector: Energia Elétrica, index_weight: 0.0217}
    CPFE3: {name: CPFL Energia, sector: Energia Elétrica, index_weight: 0.0207}
    SAPR11: {name: Sanepar, sector: Água e Saneamento, index_weight: 0.0192}
    ALUP11: {name: Alupar, sector: Energia Elétrica, index_weight: 0.0127}
    ORVR3: {name: Orizon, sector: Água e Saneamento, index_weight: 0.0103}
    AURE3: {name: Auren, sector: Energia Elétrica, index_weight: 0.0092}

data:
  provider: yfinance
  timeframe: 1d
  adjusted_prices: true
  start: "2018-01-01"
  min_history_days: 252
  benchmark_proxy: equal_weight

rebalance:
  main_frequency: monthly
  risk_check_frequency: weekly
  min_weight_change_to_trade: 0.015

regime:
  risk_on_equity: 0.95
  neutral_equity: 0.80
  defensive_equity: 0.55
  risk_off_equity: 0.30
  ma_fast: 50
  ma_mid: 100
  ma_slow: 200
  breadth_risk_on: 0.60
  breadth_neutral: 0.45
  breadth_risk_off: 0.35

portfolio:
  min_positions: 5
  max_positions: 10
  min_weight_per_asset: 0.03
  max_weight_per_asset: 0.18
  max_top3_weight: 0.50
  max_energy_weight: 0.85
  max_saneamento_weight: 0.35
  active_tilt_strength: 0.75

score_weights:
  relative_momentum: 0.35
  absolute_momentum: 0.20
  quality: 0.15
  risk: 0.15
  dividends: 0.10
  liquidity: 0.05

buy_rules:
  min_score_to_buy: 65
  require_price_above_ma100: true
  require_positive_6m_return: true
  avoid_if_price_above_ma20_plus_atr: 2.5

sell_rules:
  reduce_score_below: 55
  sell_score_below: 45
  sell_if_below_ma200: true
  sell_if_6m_momentum_negative: true
  trailing_drawdown_from_peak: 0.15

risk:
  portfolio_drawdown_reduce_1: 0.08
  portfolio_drawdown_reduce_2: 0.12
  portfolio_drawdown_protection: 0.18
  max_single_asset_drawdown: 0.15
  use_cash_protection: true

execution:
  mode: backtest
  order_type: limit
  allow_market_order: false
  max_order_percent_of_avg_volume: 0.05
  slippage_assumption: 0.002
  estimated_cost_per_trade: 0.002

backtest:
  initial_cash: 10000
  include_taxes: false
  include_slippage: true
  include_costs: true
  compare_to: [UTIL, IBOV, CDI, equal_weight_UTIL]
